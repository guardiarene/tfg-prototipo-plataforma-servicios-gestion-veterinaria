<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Clínica Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Actualizar Clínica', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-pencil-square', 'Actualizar Datos del Establecimiento', null)}"></div>
                    <div class="card-body p-4">

                        <!-- Formulario Veterinario -->
                        <form class="mb-5" method="POST" th:action="@{/veterinarian/profile/update}"
                              th:object="${veterinarian}">
                            <input th:field="*{id}" type="hidden"/>
                            <h5 class="mb-3 border-bottom pb-2 text-primary">
                                <i class="bi bi-person-badge me-2"></i>Datos del Responsable
                            </h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Nombre</label>
                                    <input class="form-control" required th:field="*{firstName}" type="text"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Apellido</label>
                                    <input class="form-control" required th:field="*{lastName}" type="text"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Teléfono</label>
                                    <input class="form-control" required th:field="*{phone}" type="tel"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email</label>
                                    <input class="form-control" required th:field="*{email}" type="email"/>
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-outline-primary" type="submit">
                                        <i class="bi bi-check2-circle me-2"></i>Actualizar Perfil Profesional
                                    </button>
                                </div>
                            </div>
                        </form>

                        <hr class="my-4">

                        <!-- Formulario Clínica -->
                        <form method="POST" th:action="@{/veterinarian/clinic/update}" th:object="${clinic}">
                            <input th:field="*{id}" type="hidden"/>
                            <h5 class="mb-3 border-bottom pb-2 text-primary">
                                <i class="bi bi-hospital me-2"></i>Datos de la Clínica
                            </h5>
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Nombre Comercial</label>
                                    <input class="form-control" required th:field="*{name}" type="text"/>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Dirección</label>
                                    <input class="form-control" required th:field="*{address}" type="text"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Teléfono de Contacto</label>
                                    <input class="form-control" required th:field="*{phone}" type="tel"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email Público</label>
                                    <input class="form-control" required th:field="*{email}" type="email"/>
                                </div>
                                <div class="col-12 mt-4">
                                    <div class="d-flex justify-content-end gap-3">
                                        <a class="btn btn-secondary px-4" th:href="@{/veterinarian/clinic}">
                                            <i class="bi bi-arrow-left-circle me-2"></i>Volver
                                        </a>
                                        <button class="btn btn-primary px-4" type="submit">
                                            <i class="bi bi-save2 me-2"></i>Guardar Cambios Clínica
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
