<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Nuevo Personal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Registrar Nuevo Personal', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-person-plus', 'Registrar Nuevo Personal', null)}"></div>
                    <div class="card-body p-4">
                        <div th:if="${error}"
                             th:insert="~{fragments/alert :: errorAlert(${error})}"></div>
                        <form method="POST" th:action="@{/veterinarian/staff/save}" th:object="${staffUser}">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Nombre', 'firstName', 'bi-person', 'text', 'Ej: Juan', true)}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Apellido', 'lastName', 'bi-person', 'text', 'Ej: Perez', true)}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Telefono', 'phone', 'bi-telephone', 'tel', 'Ej: +34 600 000 000', false)}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Email', 'email', 'bi-envelope', 'email', 'ejemplo@clinica.com', true)}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Contrasena Provisional', 'password', 'bi-key', 'password', '', true)}"></div>
                                    <small class="text-muted">El empleado debera cambiarla al primer inicio de
                                        sesion.</small>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="role">Rol en la Clinica</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light">
                                            <i aria-hidden="true" class="bi bi-shield-check"></i>
                                        </span>
                                        <select class="form-select" id="role" required th:field="*{role}">
                                            <option disabled selected value="">Seleccionar rol...</option>
                                            <option value="VETERINARIAN">Veterinario</option>
                                            <option value="RECEPTIONIST">Recepcionista</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div th:replace="~{fragments/button-group :: formButtons('/veterinarian/staff', 'Cancelar', 'Registrar Empleado', true)}"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
