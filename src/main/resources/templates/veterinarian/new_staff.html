<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Nuevo Personal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Registrar Nuevo Personal', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-person-plus', 'Registrar Nuevo Personal', null)}"></div>
                    <div class="card-body p-4">
                        <div class="alert alert-danger" role="alert" th:if="${errorMessage}">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            <span th:text="${errorMessage}">Error</span>
                        </div>

                        <form method="POST" th:action="@{/veterinarian/staff/save}" th:object="${staffUser}">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="firstName">Nombre</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                        <input class="form-control" id="firstName" placeholder="Ej: Juan"
                                               required th:field="*{firstName}" type="text">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="lastName">Apellido</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                        <input class="form-control" id="lastName" placeholder="Ej: Pérez"
                                               required th:field="*{lastName}" type="text">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="phone">Teléfono</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-telephone"></i></span>
                                        <input class="form-control" id="phone" placeholder="Ej: +34 600 000 000"
                                               th:field="*{phone}" type="tel">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="email">Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                        <input class="form-control" id="email" placeholder="ejemplo@clinica.com"
                                               required th:field="*{email}" type="email">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="password">Contraseña Provisional</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                                        <input class="form-control" id="password" required th:field="*{password}"
                                               type="password">
                                    </div>
                                    <small class="text-muted">El empleado deberá cambiarla al primer inicio de
                                        sesión.</small>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="role">Rol en la Clínica</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i
                                                class="bi bi-shield-check"></i></span>
                                        <select class="form-select" id="role" required th:field="*{role}">
                                            <option disabled selected value="">Seleccionar rol...</option>
                                            <option value="VETERINARIAN">Veterinario</option>
                                            <option value="RECEPTIONIST">Recepcionista</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end gap-3 mt-5">
                                <a class="btn btn-secondary px-4" th:href="@{/veterinarian/staff}">
                                    <i class="bi bi-arrow-left-circle me-2"></i> Cancelar
                                </a>
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="bi bi-save2 me-2"></i> Registrar Empleado
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
