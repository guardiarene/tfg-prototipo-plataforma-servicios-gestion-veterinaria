<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historias Clínicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Dashboard Veterinario', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-11 col-lg-10">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-file-medical', 'Gestión de Historias Clínicas', null)}"></div>
                    <div class="card-body p-4">
                        <div class="row mb-4">
                            <div class="col-md-8 offset-md-2">
                                <form class="input-group shadow-sm">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-search"></i>
                                    </span>
                                    <input aria-label="Buscar" class="form-control form-control-lg border-start-0"
                                           name="query"
                                           placeholder="Buscar por dueño o mascota..." type="search">
                                    <button class="btn btn-primary px-4" type="submit">Buscar</button>
                                </form>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                            <h4 class="mb-0 text-primary">Pacientes y Registros</h4>
                            <a class="btn btn-success" th:href="@{/medical-records/new}">
                                <i class="bi bi-file-earmark-plus me-2"></i>Nueva Historia Clínica
                            </a>
                        </div>

                        <div class="row g-4">
                            <div class="col-12" th:each="medicalRecord : ${medicalRecords}">
                                <div class="card shadow-sm border-primary">
                                    <div class="card-body">
                                        <div class="row align-items-center">
                                            <div class="col-md-6">
                                                <h5 class="mb-2">
                                                    <i class="bi bi-heart-fill me-2 text-danger"></i>
                                                    <span th:text="${medicalRecord.pet.name}"></span>
                                                    <small class="text-muted ms-2"
                                                           th:text="'(' + ${medicalRecord.pet.species.description} + ')'"></small>
                                                </h5>
                                                <p class="mb-0 text-muted">
                                                    <i class="bi bi-person me-2"></i>
                                                    <strong>Propietario:</strong>
                                                    <span th:text="${medicalRecord.pet.owner.firstName + ' ' + medicalRecord.pet.owner.lastName}"></span>
                                                </p>
                                            </div>
                                            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                                    <a class="btn btn-outline-primary btn-sm px-3"
                                                       th:href="@{/medical-records/{id}(id=${medicalRecord.id})}">
                                                        <i class="bi bi-info-circle me-1"></i>Detalles
                                                    </a>
                                                    <a class="btn btn-outline-warning btn-sm px-3"
                                                       th:href="@{/medical-records/{id}/edit(id=${medicalRecord.id})}">
                                                        <i class="bi bi-pencil me-1"></i>Actualizar
                                                    </a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12" th:if="${#lists.isEmpty(medicalRecords)}">
                                <div class="alert alert-info text-center py-4">
                                    <i class="bi bi-info-circle fs-2 d-block mb-2"></i>
                                    No se encontraron historias clínicas registradas.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
