<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="inputGroup(label, fieldName, icon, type, placeholder, required)">
    <label class="form-label fw-bold" th:for="${fieldName}" th:text="${label}"></label>
    <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
            <i aria-hidden="true" th:class="'bi ' + ${icon}"></i>
        </span>
        <input class="form-control form-control-lg border-start-0"
               th:aria-describedby="${fieldName} + '-error'"
               th:errorclass="is-invalid"
               th:field="*{__${fieldName}__}"
               th:id="${fieldName}"
               th:placeholder="${placeholder}"
               th:required="${required}"
               th:type="${type}">
    </div>
    <div class="invalid-feedback d-block"
         th:errors="*{__${fieldName}__}"
         th:id="${fieldName} + '-error'"
         th:if="${#fields.hasErrors('__${fieldName}__')}"></div>
</div>
<div th:fragment="inputGroupBasic(label, id, icon, type, placeholder, value, required)">
    <label class="form-label fw-bold" th:for="${id}" th:text="${label}"></label>
    <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
            <i aria-hidden="true" th:class="'bi ' + ${icon}"></i>
        </span>
        <input class="form-control form-control-lg border-start-0"
               th:id="${id}"
               th:name="${id}"
               th:placeholder="${placeholder}"
               th:required="${required}"
               th:type="${type}"
               th:value="${value}">
    </div>
</div>
<div th:fragment="selectGroup(label, fieldName, icon, options, required, defaultOption)">
    <label class="form-label fw-bold" th:for="${fieldName}" th:text="${label}"></label>
    <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
            <i aria-hidden="true" th:class="'bi ' + ${icon}"></i>
        </span>
        <select class="form-select form-select-lg"
                th:aria-describedby="${fieldName} + '-error'"
                th:errorclass="is-invalid"
                th:field="*{__${fieldName}__}"
                th:id="${fieldName}"
                th:required="${required}">
            <option th:text="${defaultOption} ?: 'Seleccionar opción...'" value=""></option>
            <option th:each="option : ${options}" th:text="${option}" th:value="${option}"></option>
        </select>
    </div>
    <div class="invalid-feedback d-block"
         th:errors="*{__${fieldName}__}"
         th:id="${fieldName} + '-error'"
         th:if="${#fields.hasErrors('__${fieldName}__')}"></div>
</div>
<div th:fragment="textareaGroup(label, fieldName, placeholder, rows, required)">
    <label class="form-label fw-bold" th:for="${fieldName}" th:text="${label}"></label>
    <textarea class="form-control form-control-lg"
              th:aria-describedby="${fieldName} + '-error'"
              th:errorclass="is-invalid"
              th:field="*{__${fieldName}__}"
              th:id="${fieldName}"
              th:placeholder="${placeholder}"
              th:required="${required}"
              th:rows="${rows}"></textarea>
    <div class="invalid-feedback d-block"
         th:errors="*{__${fieldName}__}"
         th:id="${fieldName} + '-error'"
         th:if="${#fields.hasErrors('__${fieldName}__')}"></div>
</div>
</body>
</html>
