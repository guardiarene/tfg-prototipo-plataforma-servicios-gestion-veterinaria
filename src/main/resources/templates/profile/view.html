<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Mi Perfil', ~{layouts/navbar :: navbar(#authentication.principal.role.toString() == 'CUSTOMER' ? 'CLIENT' : #authentication.principal.role.toString())}, ~{::content})}">
    <div th:fragment="content" class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-person-badge', 'Mi Perfil', null)}"></div>
                    <div class="card-body p-4">
                        <div class="row g-4">
                            <div class="col-12">
                                <div class="border p-3 rounded bg-white">
                                    <h5 class="mb-3 border-bottom pb-2 text-primary">
                                        <i class="bi bi-person-lines-fill me-2"></i>Información Personal
                                    </h5>
                                    <dl class="row mb-0">
                                        <dt class="col-md-4"><i class="bi bi-person me-2 text-muted"></i>Nombre:</dt>
                                        <dd class="col-md-8" th:text="${user.firstName}"></dd>
                                        <dt class="col-md-4 mt-3"><i class="bi bi-person me-2 text-muted"></i>Apellido:</dt>
                                        <dd class="col-md-8 mt-3" th:text="${user.lastName}"></dd>
                                        <dt class="col-md-4 mt-3"><i class="bi bi-envelope me-2 text-muted"></i>Email:</dt>
                                        <dd class="col-md-8 mt-3" th:text="${user.email}"></dd>
                                        <dt class="col-md-4 mt-3"><i class="bi bi-telephone me-2 text-muted"></i>Teléfono:</dt>
                                        <dd class="col-md-8 mt-3" th:text="${user.phone}"></dd>
                                        <dt class="col-md-4 mt-3"><i class="bi bi-shield-check me-2 text-muted"></i>Rol:</dt>
                                        <dd class="col-md-8 mt-3">
                                            <span class="badge bg-info text-dark" th:text="${user.role}"></span>
                                        </dd>
                                    </dl>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="d-flex gap-3 justify-content-end mt-4">
                                    <a class="btn btn-primary" th:href="@{/profile/edit}">
                                        <i class="bi bi-pencil-square me-2"></i>Actualizar Datos
                                    </a>
                                    <form class="d-inline" method="POST" th:action="@{/profile/deactivate}"
                                          onsubmit="return confirm('¿Estás seguro de que deseas desactivar tu cuenta? Esta acción no se puede deshacer fácilmente.');">
                                        <button class="btn btn-outline-danger" type="submit">
                                            <i class="bi bi-trash3 me-2"></i> Eliminar Cuenta
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-start mt-5">
                            <a class="btn btn-secondary"
                               th:href="${user.role.name() == 'CUSTOMER' ? '/customer/dashboard' : 
                                         (user.role.name() == 'VETERINARIAN' ? '/veterinarian/dashboard' : 
                                         (user.role.name() == 'RECEPTIONIST' ? '/receptionist/dashboard' : '/'))}">
                                <i class="bi bi-arrow-left-circle me-2"></i> Volver
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
