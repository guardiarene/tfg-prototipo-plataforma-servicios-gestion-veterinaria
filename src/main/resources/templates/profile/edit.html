<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Actualizar Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Actualizar Perfil', ~{layouts/navbar :: navbar(${role})}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-person-gear', 'Actualizar Perfil', null)}"></div>
                    <div class="card-body p-4">
                        <div th:if="${error}"
                             th:insert="~{fragments/alert :: errorAlert(${error})}"></div>
                        <form data-confirm="¿Estás seguro de que deseas actualizar tus datos?" method="POST"
                              th:action="@{/profile/edit}"
                              th:object="${user}">
                            <div class="mb-4">
                                <h5 class="mb-3 border-bottom pb-2 text-primary">
                                    <i aria-hidden="true" class="bi bi-pencil-square me-2"></i>Datos Personales
                                </h5>
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <div th:replace="~{fragments/input-group :: inputGroup('Nombre', 'firstName', 'bi-person', 'text', '', true)}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div th:replace="~{fragments/input-group :: inputGroup('Apellido', 'lastName', 'bi-person', 'text', '', true)}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div th:replace="~{fragments/input-group :: inputGroup('Email', 'email', 'bi-envelope', 'email', '', true)}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div th:replace="~{fragments/input-group :: inputGroup('Telefono', 'phone', 'bi-telephone', 'text', '', true)}"></div>
                                    </div>
                                </div>
                            </div>
                            <div th:replace="~{fragments/button-group :: formButtons('/profile', 'Cancelar', 'Guardar Cambios', true)}"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
