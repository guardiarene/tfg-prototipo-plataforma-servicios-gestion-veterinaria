<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="navbar(role)">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand text-dark fw-bold"
               th:href="${role == 'SYSTEM_ADMINISTRATOR' ? '/admin/dashboard' :
                        role == 'VETERINARIAN' ? '/veterinarian/dashboard' :
                        role == 'RECEPTIONIST' ? '/receptionist/dashboard' :
                        role == 'CUSTOMER' ? '/customer/dashboard' : '/'}">Prototipo TFG</a>
            <button aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegación"
                    class="navbar-toggler border-0" data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item" th:if="${role == 'SYSTEM_ADMINISTRATOR'}">
                        <a class="nav-link text-dark" th:href="@{/admin/dashboard}">Gestionar Usuarios</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'SYSTEM_ADMINISTRATOR'}">
                        <a class="nav-link text-dark" th:href="@{/users/new}">Nuevo Usuario</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'CUSTOMER'}">
                        <a class="nav-link text-dark" th:href="@{/profile}">Mi Perfil</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'CUSTOMER'}">
                        <a class="nav-link text-dark" th:href="@{/pets}">Mis Mascotas</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'CUSTOMER'}">
                        <a class="nav-link text-dark" th:href="@{/appointments}">Mis Turnos</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'RECEPTIONIST'}">
                        <a class="nav-link text-dark" th:href="@{/receptionist/dashboard}">Agenda</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'RECEPTIONIST'}">
                        <a class="nav-link text-dark" th:href="@{/appointments/schedule}">Agendar Turno</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'RECEPTIONIST'}">
                        <a class="nav-link text-dark" th:href="@{/reports/appointments}">Consultar Turnos Atendidos</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'VETERINARIAN'}">
                        <a class="nav-link text-dark" th:href="@{/veterinarian/dashboard}">Mis Historias</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'VETERINARIAN'}">
                        <a class="nav-link text-dark" th:href="@{/veterinarian/clinic}">Mi Clínica</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'VETERINARIAN'}">
                        <a class="nav-link text-dark" th:href="@{/veterinarian/staff}">Mi Personal</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'VETERINARIAN'}">
                        <a class="nav-link text-dark" th:href="@{/medical-services}">Mis Servicios</a>
                    </li>
                    <li class="nav-item" th:if="${role == 'VETERINARIAN'}">
                        <a class="nav-link text-dark" th:href="@{/reports/diseases-treatments}">Consultar
                            Enfermedades</a>
                    </li>
                    <li class="nav-item" th:if="${role}">
                        <form class="d-inline" method="post" th:action="@{/logout}">
                            <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden">
                            <button class="nav-link btn btn-link text-dark border-start ps-3" type="submit">Cerrar
                                Sesión
                            </button>
                        </form>
                    </li>
                    <li class="nav-item" th:unless="${role}">
                        <a class="nav-link text-dark border-start ps-3" th:href="@{/users/login}">Iniciar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
