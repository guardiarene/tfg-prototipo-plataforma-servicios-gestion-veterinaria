<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Reporte de Solicitudes y Servicios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Reporte de Turnos', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content})}">
    <div th:fragment="content" class="container mt-4">
        <div class="card shadow">
            <div th:replace="~{fragments/card-header :: cardHeader('bi-graph-up-arrow', 'Reporte de Solicitudes y Servicios', null)}"></div>
            <div class="card-body p-4">
                <form method="POST" th:action="@{/reports/appointments}" class="mb-4">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Fecha Desde:</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-calendar-event"></i></span>
                                <input class="form-control" name="startDate" required th:value="${startDate}" type="date">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Fecha Hasta:</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-calendar-check"></i></span>
                                <input class="form-control" name="endDate" required th:value="${endDate}" type="date">
                            </div>
                        </div>
                        <div class="col-md-4 d-flex gap-2">
                            <button class="btn btn-primary flex-grow-1" type="submit">
                                <i class="bi bi-file-earmark-bar-graph me-2"></i>Generar Reporte
                            </button>
                            <a class="btn btn-secondary" th:href="@{/veterinarian/dashboard}">
                                <i class="bi bi-arrow-left-circle me-2"></i>Volver
                            </a>
                        </div>
                    </div>
                </form>

                <div class="alert alert-light border shadow-sm mb-4" th:if="${startDate != null and endDate != null}">
                    <i class="bi bi-info-circle me-2 text-primary"></i>
                    Mostrando actividad desde el <strong th:text="${#temporals.format(startDate, 'dd/MM/yyyy')}"></strong>
                    hasta el <strong th:text="${#temporals.format(endDate, 'dd/MM/yyyy')}"></strong>
                </div>

                <div class="row g-4" th:if="${not #maps.isEmpty(appointments)}">
                    <div class="col-lg-8">
                        <div class="card border-0 bg-white shadow-sm h-100">
                            <div class="card-body">
                                <h5 class="card-title border-bottom pb-2 mb-4 text-primary">Visualización de Tendencia</h5>
                                <div class="chart-container" style="position: relative; height:300px; width:100%">
                                    <canvas id="graficoAppointments"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card border-0 bg-white shadow-sm h-100">
                            <div class="card-body">
                                <h5 class="card-title border-bottom pb-2 mb-4 text-primary">Desglose Diario</h5>
                                <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light sticky-top">
                                        <tr>
                                            <th>Fecha</th>
                                            <th class="text-center">Turnos</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="appointment : ${appointments}">
                                            <td th:text="${#temporals.format(appointment.key, 'dd/MM/yyyy')}"></td>
                                            <td class="text-center">
                                                <span class="badge bg-primary rounded-pill px-3" th:text="${appointment.value}"></span>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center py-5" th:if="${#maps.isEmpty(appointments) and startDate != null}">
                    <div class="alert alert-warning d-inline-block px-5 shadow-sm" role="alert">
                        <i class="bi bi-exclamation-triangle fs-4 d-block mb-2"></i>
                        No se encontraron registros para el período seleccionado
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        const appointmentsData = JSON.parse(/*[[${appointmentsJson}]]*/ '{}');
        const colores = {
            fondo: 'rgba(54, 162, 235, 0.2)',
            borde: 'rgba(54, 162, 235, 1)',
            hover: 'rgba(75, 192, 192, 0.4)'
        };

        if (Object.keys(appointmentsData).length > 0) {
            new Chart(document.getElementById('graficoAppointments'), {
                type: 'line',
                data: {
                    labels: Object.keys(appointmentsData),
                    datasets: [{
                        label: 'N° de Turnos',
                        data: Object.values(appointmentsData),
                        backgroundColor: colores.fondo,
                        borderColor: colores.borde,
                        borderWidth: 2,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {legend: {display: false}},
                    scales: {y: {beginAtZero: true}}
                }
            });
        }
    });
</script>
</body>
</html>
