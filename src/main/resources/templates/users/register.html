<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Registrarse</title>
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Registrarse', ~{layouts/navbar :: navbar(null)}, ~{::content}, ~{::pageScripts})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-person-plus', 'Registrarse', null)}"></div>
                    <div class="card-body p-4">
                        <form method="POST" th:action="@{/users/register}" th:object="${registrationUser}">
                            <input name="role" type="hidden" value="CUSTOMER">
                            <div class="row g-4 mb-4">
                                <div class="col-md-6"
                                     th:replace="~{fragments/input-group :: inputGroup('Nombre', 'firstName', 'bi-person', 'text', 'Juan', true)}"></div>
                                <div class="col-md-6"
                                     th:replace="~{fragments/input-group :: inputGroup('Apellido', 'lastName', 'bi-person', 'text', 'Pérez', true)}"></div>
                            </div>
                            <div class="row g-4 mb-4">
                                <div class="col-md-6"
                                     th:replace="~{fragments/input-group :: inputGroup('Teléfono', 'phone', 'bi-telephone', 'tel', '+54 9 11 2345-6789', true)}"></div>
                                <div class="col-md-6"
                                     th:replace="~{fragments/input-group :: inputGroup('Email', 'email', 'bi-envelope', 'email', 'juan@ejemplo.com', true)}"></div>
                            </div>
                            <div class="row g-4 mb-4">
                                <div class="col-md-6"
                                     th:replace="~{fragments/input-group :: inputGroup('Contraseña', 'password', 'bi-key', 'password', 'Mínimo 8 caracteres', true)}"></div>
                                <div class="col-md-6"
                                     th:replace="~{fragments/input-group :: inputGroupBasic('Confirmar contraseña', 'confirmPassword', 'bi-key-fill', 'password', 'Repita su contraseña', null, true)}"></div>
                            </div>
                            <div class="d-grid gap-3">
                                <button class="btn btn-primary py-3 fw-bold" type="submit">
                                    <i aria-hidden="true" class="bi bi-person-check me-2"></i>Registrarse
                                </button>
                                <a class="btn btn-link text-center mt-2" th:href="@{/users/login}">
                                    ¿Ya tenés cuenta? <u>Iniciá sesión</u>
                                </a>
                            </div>
                            <div class="mt-3" id="passwordError" style="display:none;">
                                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                    <i aria-hidden="true" class="bi bi-exclamation-triangle-fill me-2"></i>
                                    <span id="passwordErrorMessage"></span>
                                    <button aria-label="Close" class="btn-close" data-bs-dismiss="alert"
                                            type="button"></button>
                                </div>
                            </div>
                            <div class="mt-3" th:if="${error}">
                                <div th:replace="~{fragments/alert :: errorAlert(${error})}"></div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:fragment="pageScripts">
        <script src="/js/password-validation.js"></script>
        <script>initPasswordValidation('password', 'confirmPassword', 'passwordError', 'passwordErrorMessage');</script>
    </div>
</div>
</body>
</html>
