<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar Sesión</title>
</head>
<body>
<div th:replace="~{layouts/layout :: layout('Iniciar Sesión', ~{layouts/navbar :: navbar(null)}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-person-circle', 'Inicio de Sesión', null)}"></div>
                    <div class="card-body p-4">
                        <form method="POST" th:action="@{/users/login}">
                            <div class="mb-4">
                                <label class="form-label fw-bold" for="username">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i aria-hidden="true" class="bi bi-envelope"></i>
                                    </span>
                                    <input class="form-control form-control-lg border-start-0"
                                           id="username" name="username" placeholder="ejemplo@clinica.com"
                                           required type="email">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold" for="password">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i aria-hidden="true" class="bi bi-lock"></i>
                                    </span>
                                    <input class="form-control form-control-lg border-start-0"
                                           id="password" name="password" placeholder="Ingrese su contraseña"
                                           required type="password">
                                </div>
                            </div>
                            <div class="d-grid gap-3">
                                <button class="btn btn-primary py-3" type="submit">
                                    <i aria-hidden="true" class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                                </button>
                                <a class="btn btn-outline-secondary py-3" th:href="@{/users/register}">
                                    <i aria-hidden="true" class="bi bi-person-plus me-2"></i>Crear Cuenta
                                </a>
                            </div>
                            <div th:if="${param.error}">
                                <div th:replace="~{fragments/alert :: errorAlert('Credenciales incorrectas')}"></div>
                            </div>
                            <div class="mt-3" th:if="${param.registered}">
                                <div th:replace="~{fragments/alert :: successAlert('Usuario registrado con éxito.')}"></div>
                            </div>
                            <div class="mt-3" th:if="${param.success}">
                                <div th:replace="~{fragments/alert :: successAlert('Tu clínica se ha registrado con éxito. Por favor iniciá sesión.')}"></div>
                            </div>
                            <div class="mt-4" th:if="${param.logout}">
                                <div th:replace="~{fragments/alert :: successAlert('Sesión cerrada correctamente.')}"></div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
