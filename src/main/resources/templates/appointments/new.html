<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Solicitar Turno</title>
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Solicitar Turno', ~{layouts/navbar :: navbar('CUSTOMER')}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white py-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <h3 class="mb-0">
                                <i aria-hidden="true" class="bi bi-calendar-plus me-2"></i>Solicitar Turno
                            </h3>
                            <span class="h5" th:text="${clinic.name}"></span>
                        </div>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}"
                             th:insert="~{fragments/alert :: errorAlert(${error})}"></div>
                        <div th:if="${success}"
                             th:insert="~{fragments/alert :: successAlert(${success})}"></div>

                        <form data-confirm="¿Está seguro de que desea solicitar este turno?"
                              method="POST"
                              th:action="@{/appointments/new(clinicId=${clinic.id})}">
                            <input name="clinicId" th:value="${clinic.id}" type="hidden">

                            <div class="mb-4 border-bottom pb-3">
                                <h5 class="mb-3">
                                    <i aria-hidden="true"
                                       class="bi bi-calendar2-event me-2 text-primary"></i>Selección
                                    de Fecha
                                </h5>
                                <label class="form-label fw-bold" for="date">Fecha</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i aria-hidden="true" class="bi bi-calendar3"></i>
                                    </span>
                                    <input class="form-control form-control-lg border-start-0"
                                           id="date"
                                           name="date" required
                                           th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                                           type="date">
                                </div>
                            </div>

                            <div class="mb-4 border-bottom pb-3">
                                <h5 class="mb-3">
                                    <i aria-hidden="true"
                                       class="bi bi-heart-fill me-2 text-primary"></i>Selección de
                                    Mascota
                                </h5>
                                <div th:if="${not #lists.isEmpty(pets)}">
                                    <label class="form-label fw-bold" for="petId">Mascota</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i aria-hidden="true" class="bi bi-search"></i>
                                        </span>
                                        <select class="form-select form-select-lg" id="petId"
                                                name="petId" required>
                                            <option disabled selected value="">Seleccione una
                                                mascota...
                                            </option>
                                            <option th:each="pet : ${pets}"
                                                    th:text="${pet.name + ' (' + pet.species.description + ')'}"
                                                    th:value="${pet.id}"></option>
                                        </select>
                                    </div>
                                </div>
                                <div class="alert alert-warning mt-3"
                                     th:if="${#lists.isEmpty(pets)}">
                                    <i aria-hidden="true"
                                       class="bi bi-exclamation-triangle me-2"></i>
                                    No tienes mascotas registradas.
                                    <a class="alert-link" th:href="@{/pets/new}">Registrar nueva
                                        mascota</a>
                                </div>
                            </div>

                            <div class="mb-4">
                                <h5 class="mb-3">
                                    <i aria-hidden="true"
                                       class="bi bi-clipboard2-pulse me-2 text-primary"></i>Selección
                                    de Servicio
                                </h5>
                                <div th:if="${not #lists.isEmpty(services)}">
                                    <label class="form-label fw-bold"
                                           for="serviceId">Servicio</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i aria-hidden="true" class="bi bi-list-task"></i>
                                        </span>
                                        <select class="form-select form-select-lg"
                                                id="serviceId" name="serviceId" required>
                                            <option disabled selected value="">Seleccione un
                                                servicio...
                                            </option>
                                            <option th:each="service : ${services}"
                                                    th:text="${service.name}"
                                                    th:value="${service.id}"></option>
                                        </select>
                                    </div>
                                </div>
                                <div class="alert alert-warning mt-3"
                                     th:if="${#lists.isEmpty(services)}">
                                    <i aria-hidden="true"
                                       class="bi bi-exclamation-triangle me-2"></i>
                                    Actualmente no hay servicios disponibles en esta clínica
                                </div>
                            </div>

                            <div th:replace="~{fragments/button-group :: formButtons(
                                '/customer/dashboard', 'Volver', 'Solicitar Turno',
                                ${not (#lists.isEmpty(pets) or #lists.isEmpty(services))})}">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
