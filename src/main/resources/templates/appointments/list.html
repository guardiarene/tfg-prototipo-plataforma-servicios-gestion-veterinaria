<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Mis Turnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Mis Turnos', ~{layouts/navbar :: navbar('CUSTOMER')}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-calendar2-week', 'Mis Turnos', null)}"></div>
                    <div class="card-body p-4">
                        <div th:if="${success}"
                             th:insert="~{fragments/alert :: successAlert(${success})}"></div>
                        <div th:if="${error}"
                             th:insert="~{fragments/alert :: errorAlert(${error})}"></div>
                        <div class="row g-4">
                            <div class="col-12" th:each="appointment : ${appointments}">
                                <div class="card shadow-sm mb-4 border-primary">
                                    <div class="card-header bg-light">
                                        <h5 class="mb-0">
                                            <i aria-hidden="true" class="bi bi-hospital text-primary me-2"></i>
                                            <span th:text="${appointment.clinicName}"></span>
                                        </h5>
                                    </div>
                                    <div class="card-body">
                                        <div class="row g-3">
                                            <div class="col-md-6">
                                                <p class="mb-2">
                                                    <i aria-hidden="true"
                                                       class="bi bi-calendar2-event me-2 text-muted"></i>
                                                    <strong>Fecha:</strong>
                                                    <span th:text="${#temporals.format(appointment.date, 'dd/MM/yyyy')}"></span>
                                                </p>
                                                <p class="mb-2">
                                                    <i aria-hidden="true" class="bi bi-clock me-2 text-muted"></i>
                                                    <strong>Hora:</strong>
                                                    <span th:text="${appointment.time}"></span>
                                                </p>
                                                <p class="mb-0">
                                                    <i aria-hidden="true" class="bi bi-geo-alt me-2 text-muted"></i>
                                                    <strong>Dirección:</strong>
                                                    <span th:text="${appointment.clinicAddress}"></span>
                                                </p>
                                            </div>
                                            <div class="col-md-6">
                                                <p class="mb-2">
                                                    <i aria-hidden="true" class="bi bi-heart-fill me-2 text-muted"></i>
                                                    <strong>Mascota:</strong>
                                                    <span th:text="${appointment.petName + ' (' + appointment.petSpeciesDescription + ')'}"></span>
                                                </p>
                                                <p class="mb-2">
                                                    <i aria-hidden="true"
                                                       class="bi bi-clipboard2-pulse me-2 text-muted"></i>
                                                    <strong>Estado:</strong>
                                                    <span th:replace="~{fragments/status-badge :: appointmentStatus(${appointment.appointmentStatus})}"></span>
                                                </p>
                                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                                    <a class="btn btn-primary btn-sm"
                                                       th:href="@{/appointments/{id}(id=${appointment.id})}">
                                                        <i aria-hidden="true" class="bi bi-info-circle me-2"></i>Detalles
                                                    </a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12" th:if="${#lists.isEmpty(appointments)}">
                                <div th:replace="~{fragments/alert :: emptyState('No tienes turnos programados.')}"></div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a class="btn btn-secondary" th:href="@{/customer/dashboard}">
                                <i aria-hidden="true" class="bi bi-arrow-left-circle me-2"></i>Volver
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
