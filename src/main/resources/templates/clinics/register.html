<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Registrar mi clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Registrar mi clínica', ~{layouts/navbar :: navbar(null)}, ~{::content}, ~{::pageScripts})}">
    <div class="container mt-5" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-building', 'Registrar mi clínica', null)}"></div>
                    <div class="card-body p-4">
                        <div th:if="${error != null and error != ''}"
                             th:replace="~{fragments/alert :: alert('danger', 'bi-exclamation-triangle-fill', ${error}, true)}"></div>
                        <form method="POST" th:action="@{/clinics/register}"
                              th:object="${registerClinicRequest}">
                            <div class="row g-4">
                                <div class="col-12">
                                    <div class="border p-3 rounded bg-white">
                                        <h5 class="mb-3 border-bottom pb-2 text-primary">
                                            <i aria-hidden="true" class="bi bi-person-badge me-2"></i>Datos del
                                            Veterinario
                                        </h5>
                                        <div class="row g-4">
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Nombre', 'userFirstName', 'bi-person', 'text', 'Ej. Juan', true)}"></div>
                                            </div>
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Apellido', 'userLastName', 'bi-person', 'text', 'Ej. Pérez', true)}"></div>
                                            </div>
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Teléfono', 'userPhone', 'bi-telephone', 'text', 'Ej. 123-456-789', false)}"></div>
                                            </div>
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Email', 'userEmail', 'bi-envelope', 'email', 'Ej. juan@ejemplo.com', true)}"></div>
                                            </div>
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Contraseña', 'userPassword', 'bi-lock', 'password', 'Mínimo 8 caracteres', true)}"></div>
                                            </div>
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Confirmar contraseña', 'confirmPassword', 'bi-lock-fill', 'password', 'Repita su contraseña', true)}"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12" id="passwordError" style="display:none;">
                                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                        <i aria-hidden="true" class="bi bi-exclamation-triangle-fill me-2"></i>
                                        <span id="passwordErrorMessage"></span>
                                        <button aria-label="Close" class="btn-close" data-bs-dismiss="alert"
                                                type="button"></button>
                                    </div>
                                </div>
                                <div class="col-12 mt-4">
                                    <div class="border p-3 rounded bg-white">
                                        <h5 class="mb-3 border-bottom pb-2 text-primary">
                                            <i aria-hidden="true" class="bi bi-hospital me-2"></i>Datos de la clínica
                                        </h5>
                                        <div class="row g-4">
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Nombre', 'clinicName', 'bi-building', 'text', 'Ej. Clínica Veterinaria San Juan', true)}"></div>
                                            </div>
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Teléfono', 'clinicPhone', 'bi-telephone', 'text', 'Ej. 987-654-321', true)}"></div>
                                            </div>
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Dirección', 'clinicAddress', 'bi-geo-alt', 'text', 'Ej. Calle Ficticia 123', true)}"></div>
                                            </div>
                                            <div class="col-md-6">
                                                <div th:replace="~{fragments/input-group :: inputGroup('Email', 'clinicEmail', 'bi-envelope', 'email', 'Ej. info@clinica.com', true)}"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div th:replace="~{fragments/button-group :: formButtons('/', 'Volver', 'Registrarse', true)}"></div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:fragment="pageScripts">
    <script src="/js/password-validation.js"></script>
    <script>initPasswordValidation('userPassword', 'confirmPassword', 'passwordError', 'passwordErrorMessage');</script>
</div>
</body>
</html>
