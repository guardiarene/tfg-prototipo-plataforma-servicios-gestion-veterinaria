<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Servicios Médicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Servicios Médicos', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-clipboard2-pulse', 'Gestión de Servicios Médicos', null)}"></div>
                    <div class="card-body p-4">
                        <div th:if="${error}">
                            <div th:insert="~{fragments/alert :: errorAlert(${error})}"></div>
                        </div>
                        <div th:if="${param.created}">
                            <div th:replace="~{fragments/alert :: successAlert('Servicio creado correctamente.')}"></div>
                        </div>
                        <div th:if="${param.updated}">
                            <div th:replace="~{fragments/alert :: successAlert('Servicio actualizado correctamente.')}"></div>
                        </div>
                        <div th:if="${param.deleted}">
                            <div th:replace="~{fragments/alert :: successAlert('Servicio eliminado correctamente.')}"></div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                            <h4 class="mb-0 text-primary">Listado de Servicios</h4>
                            <a class="btn btn-success" th:href="@{/medical-services/new}">
                                <i aria-hidden="true" class="bi bi-plus-circle me-2"></i>Nuevo Servicio
                            </a>
                        </div>

                        <div class="row g-4">
                            <div class="col-12" th:each="service : ${services}">
                                <div class="card shadow-sm border-primary">
                                    <div class="card-body">
                                        <div class="row align-items-center">
                                            <div class="col-md-8">
                                                <h5 class="mb-2 text-primary" th:text="${service.name}"></h5>
                                                <p class="mb-0 text-muted small" th:text="${service.description}"></p>
                                            </div>
                                            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                                    <a class="btn btn-outline-warning btn-sm px-3"
                                                       th:href="@{/medical-services/{id}/edit(id=${service.id})}">
                                                        <i aria-hidden="true" class="bi bi-pencil me-1"></i>Editar
                                                    </a>
                                                    <form class="d-inline"
                                                          data-confirm="¿Estás seguro de eliminar este servicio?"
                                                          method="post"
                                                          th:action="@{/medical-services/{id}/delete(id=${service.id})}">
                                                        <button class="btn btn-outline-danger btn-sm px-3"
                                                                type="submit">
                                                            <i aria-hidden="true" class="bi bi-trash me-1"></i>Eliminar
                                                        </button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12" th:if="${#lists.isEmpty(services)}">
                                <div th:replace="~{fragments/alert :: emptyState('No hay servicios médicos registrados en tu clínica.')}"></div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-start mt-5">
                            <a class="btn btn-secondary px-4" th:href="@{/veterinarian/dashboard}">
                                <i aria-hidden="true" class="bi bi-arrow-left-circle me-2"></i> Volver
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
