<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Editar Servicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Editar Servicio', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-pencil-square', 'Editar Servicio Medico', null)}"></div>
                    <div class="card-body p-4">
                        <div th:if="${error}"
                             th:insert="~{fragments/alert :: errorAlert(${error})}"></div>
                        <form data-confirm="Estas seguro de que deseas actualizar este servicio medico?"
                              method="post"
                              th:action="@{/medical-services/{id}/edit(id=${medicalServiceId})}"
                              th:object="${medicalService}">
                            <input name="clinicId" th:value="${clinicId}" type="hidden">
                            <div class="row g-4">
                                <div class="col-12">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Nombre del Servicio', 'name', 'bi-file-medical', 'text', 'Ej: Vacunacion anual', true)}"></div>
                                </div>
                                <div class="col-12">
                                    <div th:replace="~{fragments/input-group :: textareaGroup('Descripcion', 'description', 'Descripcion detallada del servicio', 4, true)}"></div>
                                </div>
                                <div class="col-12">
                                    <div th:replace="~{fragments/button-group :: formButtons('/medical-services', 'Volver', 'Guardar Cambios', true)}"></div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
