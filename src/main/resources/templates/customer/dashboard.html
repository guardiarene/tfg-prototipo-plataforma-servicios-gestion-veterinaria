<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Interfaz del Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Dashboard Cliente', ~{layouts/navbar :: navbar('CUSTOMER')}, ~{::content})}">
    <div th:fragment="content" class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-speedometer2', 'Portal del Cliente', null)}"></div>
                    <div class="card-body p-4">
                        <div class="row g-4 mb-5">
                            <div class="col-md-4">
                                <div class="card bg-primary text-white text-center p-3 h-100 shadow-sm">
                                    <div class="card-body">
                                        <i class="bi bi-heart-fill fs-1 mb-3"></i>
                                        <h5>Mis Mascotas</h5>
                                        <a th:href="@{/pets}" class="btn btn-light btn-sm mt-2">Ver Lista</a>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card bg-success text-white text-center p-3 h-100 shadow-sm">
                                    <div class="card-body">
                                        <i class="bi bi-calendar-check fs-1 mb-3"></i>
                                        <h5>Mis Turnos</h5>
                                        <a th:href="@{/appointments}" class="btn btn-light btn-sm mt-2">Ver Turnos</a>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card bg-info text-white text-center p-3 h-100 shadow-sm">
                                    <div class="card-body">
                                        <i class="bi bi-person-circle fs-1 mb-3"></i>
                                        <h5>Mi Perfil</h5>
                                        <a th:href="@{/profile}" class="btn btn-light btn-sm mt-2">Gestionar</a>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="border-top pt-4">
                            <h4 class="mb-4 text-primary"><i class="bi bi-search me-2"></i>Buscar Clínicas Veterinarias</h4>
                            <form method="GET" th:action="@{/clinics/search}">
                                <div class="input-group mb-4 shadow-sm">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-search"></i>
                                    </span>
                                    <input aria-label="Buscar veterinarias"
                                           class="form-control form-control-lg border-start-0"
                                           name="q" placeholder="Buscar por nombre, dirección o servicios..."
                                           th:value="${searchQuery}" type="search">
                                    <button class="btn btn-primary px-4" type="submit">Buscar</button>
                                </div>
                            </form>
                            
                            <div class="mb-3 border-bottom pb-2">
                                <h5 class="mb-0 text-muted">Clínicas Destacadas</h5>
                            </div>
                            <div class="row g-4">
                                <div class="col-12" th:each="clinic : ${veterinaryClinics}">
                                    <div class="card shadow-sm border-primary h-100">
                                        <div class="card-header bg-light">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <h5 class="mb-0" th:text="${clinic.name}"></h5>
                                                <a class="btn btn-outline-primary btn-sm px-3" th:href="@{/clinics/{id}(id=${clinic.id})}">
                                                    <i class="bi bi-info-circle me-1"></i>Detalles
                                                </a>
                                            </div>
                                        </div>
                                        <div class="card-body">
                                            <div class="row g-3">
                                                <div class="col-md-8">
                                                    <p class="mb-2">
                                                        <i class="bi bi-geo-alt me-2 text-muted"></i>
                                                        <span th:text="${clinic.address}"></span>
                                                    </p>
                                                    <p class="mb-0 small">
                                                        <i class="bi bi-clipboard2-pulse me-2 text-muted"></i>
                                                        <strong>Servicios:</strong>
                                                        <span th:each="service, iterStat : ${clinic.services}">
                                                            <span th:text="${service.name}"></span><span th:if="${!iterStat.last}">, </span>
                                                        </span>
                                                        <span th:if="${#lists.isEmpty(clinic.services)}" class="text-muted italic">No hay servicios listados</span>
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12" th:if="${#lists.isEmpty(veterinaryClinics)}">
                                    <div class="alert alert-info">
                                        <i class="bi bi-info-circle me-2"></i>No se encontraron clínicas veterinarias disponibles en este momento.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
