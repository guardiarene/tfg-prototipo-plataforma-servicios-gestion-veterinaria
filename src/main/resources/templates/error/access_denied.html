<!DOCTYPE html>
<html lang="es" th:replace="~{layouts/layout :: layout('Acceso Denegado', ~{::navbar}, ~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado</title>
</head>
<body>
<div th:fragment="navbar">
    <div th:replace="~{layouts/navbar :: navbar(null)}"></div>
</div>

<div class="container mt-5" th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow">
                <div class="card-body py-5">
                    <i class="bi bi-exclamation-triangle-fill text-danger display-1 mb-4"></i>
                    <h1 class="display-5 fw-bold text-dark">Acceso Denegado</h1>
                    <p class="lead mb-4">Lo sentimos, no tienes los permisos necesarios para acceder a esta página.</p>
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-4">
                        <a class="btn btn-primary btn-lg px-4 gap-3" th:href="@{/}">Volver al Inicio</a>
                        <button class="btn btn-outline-secondary btn-lg px-4" onclick="history.back()">Volver Atrás
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
