<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Registro de Usuario', ~{layouts/navbar :: navbar('SYSTEM_ADMINISTRATOR')}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-person-plus', 'Registrar Nuevo Usuario', null)}"></div>
                    <div class="card-body p-4">
                        <form method="POST" th:action="@{/users/new}" th:object="${user}">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Nombre', 'firstName', 'bi-person', 'text', '', true)}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Apellido', 'lastName', 'bi-person', 'text', '', true)}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Telefono', 'phone', 'bi-telephone', 'tel', '', false)}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Email', 'email', 'bi-envelope', 'email', '', true)}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Contrasena', 'password', 'bi-key', 'password', '', true)}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="role">Rol</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light">
                                            <i aria-hidden="true" class="bi bi-shield-check"></i>
                                        </span>
                                        <select class="form-select" id="role" required th:errorclass="is-invalid"
                                                th:field="*{role}">
                                            <option disabled selected value="">Seleccionar rol...</option>
                                            <option th:each="role : ${roles}" th:text="${role.name()}"
                                                    th:value="${role}"></option>
                                        </select>
                                        <div class="invalid-feedback" th:errors="*{role}"
                                             th:if="${#fields.hasErrors('role')}"></div>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-check form-switch mt-2">
                                        <input checked class="form-check-input" id="activeSwitch" role="switch"
                                               th:field="*{active}"
                                               type="checkbox">
                                        <label class="form-check-label fw-bold" for="activeSwitch">Cuenta Activa</label>
                                    </div>
                                </div>
                            </div>
                            <div th:replace="~{fragments/button-group :: formButtons('/admin/dashboard', 'Cancelar', 'Registrar Usuario', true)}"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
