<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Editar Usuario', ~{layouts/navbar :: navbar('SYSTEM_ADMINISTRATOR')}, ~{::content})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-pencil-square', 'Editar Usuario', null)}"></div>
                    <div class="card-body p-4">
                        <form method="POST" th:action="@{/users/edit/{id}(id=${user.id})}" th:object="${user}">
                            <div class="row g-4">
                                <div class="col-12">
                                    <h5 class="mb-3 border-bottom pb-2 text-primary">
                                        <i class="bi bi-person-badge me-2"></i>Datos Personales
                                    </h5>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Nombre</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                        <label>
                                            <input class="form-control" required th:errorclass="is-invalid"
                                                   th:field="*{firstName}" type="text">
                                        </label>
                                        <div class="invalid-feedback" th:errors="*{firstName}"
                                             th:if="${#fields.hasErrors('firstName')}"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Apellido</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                        <label>
                                            <input class="form-control" required th:errorclass="is-invalid"
                                                   th:field="*{lastName}" type="text">
                                        </label>
                                        <div class="invalid-feedback" th:errors="*{lastName}"
                                             th:if="${#fields.hasErrors('lastName')}"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Teléfono</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-telephone"></i></span>
                                        <label>
                                            <input class="form-control" th:errorclass="is-invalid" th:field="*{phone}"
                                                   type="tel">
                                        </label>
                                        <div class="invalid-feedback" th:errors="*{phone}"
                                             th:if="${#fields.hasErrors('phone')}"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                        <label>
                                            <input class="form-control" required th:errorclass="is-invalid"
                                                   th:field="*{email}" type="email">
                                        </label>
                                        <div class="invalid-feedback" th:errors="*{email}"
                                             th:if="${#fields.hasErrors('email')}"></div>
                                    </div>
                                </div>

                                <div class="col-12 mt-4">
                                    <h5 class="mb-3 border-bottom pb-2 text-primary">
                                        <i class="bi bi-shield-lock me-2"></i>Configuración de Cuenta
                                    </h5>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Rol</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i
                                                class="bi bi-shield-check"></i></span>
                                        <label>
                                            <select class="form-select" required th:errorclass="is-invalid"
                                                    th:field="*{role}">
                                                <option th:each="role : ${roles}" th:text="${role.name()}"
                                                        th:value="${role}"></option>
                                            </select>
                                        </label>
                                        <div class="invalid-feedback" th:errors="*{role}"
                                             th:if="${#fields.hasErrors('role')}"></div>
                                    </div>
                                </div>
                                <div class="col-md-6 d-flex align-items-center">
                                    <div class="form-check form-switch mt-3">
                                        <input class="form-check-input" id="activeSwitch" role="switch"
                                               th:field="*{active}"
                                               type="checkbox">
                                        <label class="form-check-label fw-bold" for="activeSwitch">Cuenta Activa</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Cambiar Contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                                        <label>
                                            <input class="form-control" placeholder="Dejar en blanco para no cambiar"
                                                   th:field="*{password}" type="password">
                                        </label>
                                    </div>
                                    <div class="form-text text-info small mt-1">
                                        <i class="bi bi-info-circle me-1"></i>La contraseña se almacenará cifrada
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end gap-3 mt-5">
                                <a class="btn btn-secondary px-4" th:href="@{/admin/dashboard}">
                                    <i class="bi bi-arrow-left-circle me-2"></i> Cancelar
                                </a>
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="bi bi-save2 me-2"></i> Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
