<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Reprogramar Turno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Reprogramar Turno', ~{layouts/navbar :: navbar('RECEPTIONIST')}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-arrow-repeat', 'Reprogramar Turno', null)}"></div>
                    <div class="card-body p-4">
                        <form data-confirm="¿Está seguro de que desea confirmar los cambios en la programación de este turno?"
                              method="POST" th:action="@{/appointments/{id}/reschedule(id=${appointment.id})}"
                              th:object="${appointment}">
                            <input th:field="*{id}" type="hidden"/>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="customerName">Cliente</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i aria-hidden="true"
                                                                                   class="bi bi-person"></i></span>
                                        <input class="form-control bg-light" id="customerName" readonly
                                               th:value="${appointment.customer.firstName + ' ' + appointment.customer.lastName}"
                                               type="text">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="petName">Mascota</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i aria-hidden="true"
                                                                                   class="bi bi-heart"></i></span>
                                        <input class="form-control bg-light" id="petName" readonly
                                               th:value="${appointment.pet.name}"
                                               type="text">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="date">Nueva Fecha</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text bg-light"><i aria-hidden="true"
                                                                                   class="bi bi-calendar3"></i></span>
                                        <input class="form-control" id="date" required
                                               th:errorclass="is-invalid"
                                               th:field="*{date}"
                                               th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                                               type="date">
                                        <div class="invalid-feedback" th:errors="*{date}"
                                             th:if="${#fields.hasErrors('date')}"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div th:replace="~{fragments/input-group :: inputGroup('Nueva Hora', 'time', 'bi-clock', 'time', '', true)}"></div>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold" for="medicalService">Servicio</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text bg-light"><i
                                                aria-hidden="true" class="bi bi-clipboard2-pulse"></i></span>
                                        <select class="form-select"
                                                id="medicalService" required
                                                th:errorclass="is-invalid"
                                                th:field="*{medicalService.id}">
                                            <option th:each="service : ${services}"
                                                    th:text="${service.name}"
                                                    th:value="${service.id}"></option>
                                        </select>
                                        <div class="invalid-feedback" th:errors="*{medicalService}"
                                             th:if="${#fields.hasErrors('medicalService')}"></div>
                                    </div>
                                </div>
                            </div>
                            <div th:replace="~{fragments/button-group :: formButtons('/receptionist/dashboard', 'Volver', 'Confirmar Cambios', true)}"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
