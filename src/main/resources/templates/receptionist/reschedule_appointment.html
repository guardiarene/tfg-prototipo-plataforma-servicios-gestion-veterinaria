<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Reprogramar Turno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Reprogramar Turno', ~{layouts/navbar :: navbar('RECEPTIONIST')}, ~{::content})}">
    <div th:fragment="content" class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-arrow-repeat', 'Reprogramar Turno', null)}"></div>
                    <div class="card-body p-4">
                        <form method="POST" th:action="@{/appointments/{id}/reschedule(id=${appointment.id})}"
                              th:object="${appointment}">
                            <input th:field="*{id}" type="hidden"/>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Cliente</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                        <input class="form-control bg-light" readonly
                                               th:value="${appointment.customer.firstName + ' ' + appointment.customer.lastName}"
                                               type="text">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Mascota</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-heart"></i></span>
                                        <input class="form-control bg-light" readonly th:value="${appointment.pet.name}" type="text">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Nueva Fecha</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-calendar3"></i></span>
                                        <input class="form-control" id="date" name="date" required
                                               th:value="${appointment.date != null} ? ${#temporals.format(appointment.date, 'yyyy-MM-dd')} : ''"
                                               type="date" th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Nueva Hora</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-clock"></i></span>
                                        <input class="form-control" id="time" name="time" required
                                               th:value="${appointment.time != null} ? ${appointment.time} : ''"
                                               type="time">
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Servicio</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-clipboard2-pulse"></i></span>
                                        <select class="form-select" required th:field="*{medicalService}">
                                            <option th:each="service : ${services}"
                                                    th:selected="${appointment.medicalService.id == service.id}"
                                                    th:text="${service.name}"
                                                    th:value="${service.id}"></option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end gap-3 mt-5">
                                <a class="btn btn-secondary px-4" th:href="@{/receptionist/dashboard}">
                                    <i class="bi bi-arrow-left-circle me-2"></i> Volver
                                </a>
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="bi bi-check-circle me-2"></i> Confirmar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
