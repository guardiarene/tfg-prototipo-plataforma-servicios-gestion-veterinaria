<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Turnos - Recepcionista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Dashboard Recepcionista', ~{layouts/navbar :: navbar(${role})}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-11 col-lg-10">
                <div class="card shadow">
                    <div th:replace="~{fragments/card-header :: cardHeader('bi-calendar-check', 'Gestión de Turnos', null)}"></div>
                    <div class="card-body p-4">
                        <div th:if="${success}">
                            <div th:replace="~{fragments/alert :: successAlert(${success})}"></div>
                        </div>
                        <div th:if="${param.rescheduled}">
                            <div th:replace="~{fragments/alert :: successAlert('¡Éxito! El turno se ha reprogramado correctamente.')}"></div>
                        </div>
                        <div th:if="${error}">
                            <div th:replace="~{fragments/alert :: errorAlert(${error})}"></div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-8 offset-md-2">
                                <form class="input-group shadow-sm" method="GET" th:action="@{/appointments/search}">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i aria-hidden="true" class="bi bi-search"></i>
                                    </span>
                                    <input aria-label="Buscar" class="form-control form-control-lg border-start-0"
                                           name="query"
                                           placeholder="Buscar por cliente o mascota..." type="search">
                                    <button class="btn btn-primary px-4" type="submit">Buscar</button>
                                </form>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                            <h4 class="mb-0 text-primary">Agenda de Turnos</h4>
                            <a class="btn btn-success" th:href="@{/appointments/schedule}">
                                <i aria-hidden="true" class="bi bi-calendar-plus me-2"></i>Agendar Turno
                            </a>
                        </div>
                        <div class="row g-4">
                            <div class="col-12" th:each="appointment : ${appointments}">
                                <div class="card shadow-sm border-primary">
                                    <div class="card-body">
                                        <div class="row align-items-center">
                                            <div class="col-md-5">
                                                <h5 class="mb-2">
                                                    <i aria-hidden="true" class="bi bi-person me-2 text-muted"></i>
                                                    <span th:text="${appointment.customerFullName}"></span>
                                                </h5>
                                                <p class="mb-2">
                                                    <i aria-hidden="true" class="bi bi-heart me-2 text-muted"></i>
                                                    <strong>Mascota:</strong>
                                                    <span th:text="${appointment.petName + ' (' + appointment.petSpeciesDescription + ')'}"></span>
                                                </p>
                                                <p class="mb-0">
                                                    <i aria-hidden="true" class="bi bi-clock me-2 text-muted"></i>
                                                    <strong>Fecha y Hora:</strong>
                                                    <span th:text="${#temporals.format(appointment.date, 'dd/MM/yyyy') + ' - ' + appointment.time}"></span>
                                                </p>
                                            </div>
                                            <div class="col-md-3">
                                                <form method="POST"
                                                      th:action="@{/appointments/{id}/update-status(id=${appointment.id})}">
                                                    <label class="form-label small fw-bold text-muted mb-1">Cambiar
                                                        Estado:</label>
                                                    <select class="form-select form-select-sm" name="status"
                                                            onchange="this.form.submit()">
                                                        <option th:each="status : ${T(tfg.psygcv.entity.appointment.AppointmentStatus).values()}"
                                                                th:selected="${appointment.appointmentStatus == status}"
                                                                th:text="${status.description}"
                                                                th:value="${status}"></option>
                                                    </select>
                                                </form>
                                            </div>
                                            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                                    <a class="btn btn-outline-primary btn-sm"
                                                       th:href="@{/appointments/{id}(id=${appointment.id})}">
                                                        <i aria-hidden="true" class="bi bi-info-circle"></i>
                                                    </a>
                                                    <a class="btn btn-outline-warning btn-sm"
                                                       th:href="@{/appointments/{id}/reschedule(id=${appointment.id})}">
                                                        <i aria-hidden="true" class="bi bi-calendar-event"></i>
                                                    </a>
                                                    <form data-confirm="¿Estás seguro de cancelar este turno?"
                                                          method="POST"
                                                          th:action="@{/appointments/{id}/cancel(id=${appointment.id})}">
                                                        <button class="btn btn-outline-danger btn-sm" type="submit">
                                                            <i aria-hidden="true" class="bi bi-x-circle"></i>
                                                        </button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12" th:if="${#lists.isEmpty(appointments)}">
                                <div th:replace="~{fragments/alert :: emptyState('No hay turnos registrados para hoy.')}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
