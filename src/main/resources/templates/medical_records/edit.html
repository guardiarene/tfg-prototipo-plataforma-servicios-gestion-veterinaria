<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Historia Clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Editar Historia Clínica', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content}, ~{::pageScripts})}">
    <div class="container mt-4" th:fragment="content">
        <div class="card shadow">
            <div th:replace="~{fragments/card-header :: cardHeader('bi-pencil-square', 'Editar Historia Clínica', null)}"></div>
            <form class="card-body" method="POST" th:action="@{/medical-records/{id}/edit(id=${medicalRecord.id})}"
                  th:object="${medicalRecord}">
                <input th:field="*{id}" type="hidden"/>
                <input th:field="*{visits[0].date}" type="hidden"/>
                <div th:if="${error}"
                     th:insert="~{fragments/alert :: errorAlert(${error})}"></div>
                <div class="mb-4">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Actualización de Historia Clínica</h4>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Mascota:</label>
                            <input th:field="*{pet.id}" type="hidden"/>
                            <div class="form-control bg-light">
                                <span th:text="${medicalRecord.pet.name + ' (' + medicalRecord.pet.owner.firstName + ' ' + medicalRecord.pet.owner.lastName + ')'}"></span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold" for="visits0.visitType">Tipo de Visita</label>
                            <select class="form-select" id="visits0.visitType" required
                                    th:field="*{visits[0].visitType}">
                                <option th:each="type : ${T(tfg.psygcv.entity.medical.VisitType).values()}"
                                        th:text="${type.description}" th:value="${type}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Fecha de la Visita</label>
                            <div class="form-control bg-light">
                                <span th:text="${#temporals.format(medicalRecord.visits[0].date, 'dd/MM/yyyy')}"></span>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-bold" for="visits0.reasonForVisit">Motivo de la
                                Actualización</label>
                            <textarea class="form-control" id="visits0.reasonForVisit"
                                      placeholder="Ingrese el motivo de esta actualización..."
                                      required rows="3" th:field="*{visits[0].reasonForVisit}"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold" for="visits0.observations">Observaciones de la
                                Visita</label>
                            <textarea class="form-control" id="visits0.observations"
                                      placeholder="Observaciones clínicas de esta visita..."
                                      rows="2" th:field="*{visits[0].observations}"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold" for="generalObservations">Observaciones Generales de la
                                Historia</label>
                            <textarea class="form-control" id="generalObservations"
                                      placeholder="Observaciones permanentes o importantes de la historia clínica..."
                                      rows="2" th:field="*{generalObservations}"></textarea>
                        </div>
                    </div>
                </div>
                <div class="mb-4 border p-3 rounded bg-light">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Examen Clínico (Actualización)</h4>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Temperatura (°C)</label>
                            <input class="form-control" placeholder="Ej: 38.5" required
                                   step="0.1" th:field="*{visits[0].clinicalExam.temperature}" type="number">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Peso (kg)</label>
                            <input class="form-control" placeholder="Ej: 10.5" required
                                   step="0.1" th:field="*{visits[0].clinicalExam.weight}" type="number">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Frec. Cardíaca (lpm)</label>
                            <input class="form-control" placeholder="Ej: 90" required
                                   th:field="*{visits[0].clinicalExam.heartRate}" type="number">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Frec. Respiratoria (rpm)</label>
                            <input class="form-control" placeholder="Ej: 25" required
                                   th:field="*{visits[0].clinicalExam.respiratoryRate}" type="number">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Pulso (lpm)</label>
                            <input class="form-control" placeholder="Ej: 100" required
                                   th:field="*{visits[0].clinicalExam.pulse}" type="number">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mucosas</label>
                            <input class="form-control" placeholder="Ej: Irritadas, húmedas"
                                   required th:field="*{visits[0].clinicalExam.mucosalMembranes}" type="text">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Temperamento</label>
                            <select class="form-select" required th:field="*{visits[0].clinicalExam.temperament}">
                                <option th:each="temp : ${T(tfg.psygcv.entity.pet.Temperament).values()}"
                                        th:text="${temp.description}" th:value="${temp}"></option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Descripción del Examen</label>
                            <textarea class="form-control" placeholder="Detalles del examen realizado" rows="2"
                                      th:field="*{visits[0].clinicalExam.description}"></textarea>
                        </div>
                    </div>
                </div>
                <div class="mb-4">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Anamnesis</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Alergias</label>
                            <input class="form-control" placeholder="Ej: Penicilina, polen"
                                   th:field="*{visits[0].anamnesis.allergies}" type="text">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Enfermedades Previas</label>
                            <input class="form-control" placeholder="Ej: Parvovirus a los 6 meses"
                                   th:field="*{visits[0].anamnesis.previousDiseases}" type="text">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Cirugías</label>
                            <input class="form-control" placeholder="Ej: Ortopédica de cadera"
                                   th:field="*{visits[0].anamnesis.surgeries}" type="text">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Medicación Actual</label>
                            <input class="form-control" placeholder="Ej: Vitaminas, antibióticos"
                                   th:field="*{visits[0].anamnesis.currentMedications}" type="text">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Alimentación</label>
                            <input class="form-control" placeholder="Ej: Alimento balanceado X, 2 veces al día"
                                   th:field="*{visits[0].anamnesis.diet}" type="text">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Estado Reproductivo</label>
                            <select class="form-select" th:field="*{visits[0].anamnesis.reproductiveStatus}">
                                <option th:each="status : ${T(tfg.psygcv.entity.pet.ReproductiveStatus).values()}"
                                        th:text="${status.description}" th:value="${status}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Última Desparasitación</label>
                            <input class="form-control" th:field="*{visits[0].anamnesis.lastDewormingDate}"
                                   type="date">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Último Celo (si aplica)</label>
                            <input class="form-control" th:field="*{visits[0].anamnesis.lastHeatDate}" type="date">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Último Parto (si aplica)</label>
                            <input class="form-control" th:field="*{visits[0].anamnesis.lastBirthDate}" type="date">
                        </div>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                        <h4 class="mb-0 text-primary">Vacunas Aplicadas</h4>
                        <button class="btn btn-outline-success btn-sm" onclick="addVaccine()" type="button">
                            <i aria-hidden="true" class="bi bi-plus-circle me-1"></i>Añadir Vacuna
                        </button>
                    </div>
                    <div id="vaccines-container">
                        <div class="vaccine-template row g-3 mb-3"
                             th:each="vaccine, iter : ${medicalRecord.visits[0].vaccines}">
                            <input th:field="*{visits[0].vaccines[__${iter.index}__].id}" type="hidden"/>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">Fecha Aplicación</label>
                                <input class="form-control" required
                                       th:field="*{visits[0].vaccines[__${iter.index}__].applicationDate}"
                                       type="date">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">Marca</label>
                                <input class="form-control" placeholder="Marca" required
                                       th:field="*{visits[0].vaccines[__${iter.index}__].brand}" type="text">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">Lote</label>
                                <input class="form-control" placeholder="Lote" required
                                       th:field="*{visits[0].vaccines[__${iter.index}__].batch}" type="text">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Dosis</label>
                                <input class="form-control" placeholder="Dosis" required
                                       th:field="*{visits[0].vaccines[__${iter.index}__].dose}" type="text">
                            </div>
                            <div class="col-md-1 d-flex align-items-end">
                                <button aria-label="Eliminar vacuna" class="btn btn-danger w-100"
                                        onclick="removeVaccine(this)" type="button">
                                    <i aria-hidden="true" class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                        <h4 class="mb-0 text-primary">Diagnóstico</h4>
                        <button class="btn btn-outline-success btn-sm" onclick="addDiagnostic()" type="button">
                            <i aria-hidden="true" class="bi bi-plus-circle me-1"></i>Añadir Diagnóstico
                        </button>
                    </div>
                    <div id="diagnostics-container">
                        <div class="diagnostic-template card mb-3 shadow-sm"
                             th:each="diag, iter : ${medicalRecord.visits[0].diagnostics}">
                            <input th:field="*{visits[0].diagnostics[__${iter.index}__].id}" type="hidden"/>
                            <div class="card-body">
                                <div class="row g-3 align-items-center">
                                    <div class="col-md-11">
                                        <label class="form-label small fw-bold">Problemas / Hallazgos</label>
                                        <input class="form-control" placeholder="Descripción detallada" required
                                               th:field="*{visits[0].diagnostics[__${iter.index}__].problems[0]}"
                                               type="text">
                                    </div>
                                    <div class="col-md-1 d-flex align-items-end">
                                        <button aria-label="Eliminar diagnóstico" class="btn btn-danger w-100"
                                                onclick="removeDiagnostic(this)" type="button">
                                            <i aria-hidden="true" class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                        <h4 class="mb-0 text-primary">Tratamiento</h4>
                        <button class="btn btn-outline-success btn-sm" onclick="addTreatment()" type="button">
                            <i aria-hidden="true" class="bi bi-plus-circle me-1"></i>Añadir Tratamiento
                        </button>
                    </div>
                    <div id="treatments-container">
                        <div class="treatment-template card mb-3 shadow-sm"
                             th:each="treatment, iter : ${medicalRecord.visits[0].treatments}">
                            <input th:field="*{visits[0].treatments[__${iter.index}__].id}" type="hidden"/>
                            <div class="card-body">
                                <div class="row g-3 align-items-center">
                                    <div class="col-md-3">
                                        <label class="form-label small fw-bold">Producto</label>
                                        <input class="form-control" placeholder="Producto" required
                                               th:field="*{visits[0].treatments[__${iter.index}__].product}"
                                               type="text">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small fw-bold">Vía</label>
                                        <input class="form-control" placeholder="Vía" required
                                               th:field="*{visits[0].treatments[__${iter.index}__].route}"
                                               type="text">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small fw-bold">Frecuencia</label>
                                        <input class="form-control" placeholder="Frecuencia" required
                                               th:field="*{visits[0].treatments[__${iter.index}__].frequency}"
                                               type="text">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small fw-bold">Inicio</label>
                                        <input class="form-control" required
                                               th:field="*{visits[0].treatments[__${iter.index}__].startDate}"
                                               type="date">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small fw-bold">Fin</label>
                                        <input class="form-control"
                                               th:field="*{visits[0].treatments[__${iter.index}__].endDate}"
                                               type="date">
                                    </div>
                                    <div class="col-md-1 d-flex align-items-end">
                                        <button aria-label="Eliminar tratamiento" class="btn btn-danger w-100"
                                                onclick="removeTreatment(this)" type="button">
                                            <i aria-hidden="true" class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-6 mb-2 mb-md-0">
                            <button class="btn btn-primary w-100" type="submit">
                                <i aria-hidden="true" class="bi bi-save me-2"></i>Actualizar Historia Clínica
                            </button>
                        </div>
                        <div class="col-md-6">
                            <a class="btn btn-secondary w-100"
                               th:href="@{/medical-records/{id}(id=${medicalRecord.id})}">
                                <i aria-hidden="true" class="bi bi-x-circle me-2"></i> Cancelar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:fragment="pageScripts">
    <script src="/js/medical-record-dynamic.js"></script>
</div>
</div>
</body>
</html>
