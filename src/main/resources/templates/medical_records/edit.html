<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Historia Clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Editar Historia Clínica', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content})}">
    <div class="container mt-4" th:fragment="content">
        <div class="card shadow">
            <div th:replace="~{fragments/card-header :: cardHeader('bi-pencil-square', 'Editar Historia Clínica', null)}"></div>
            <form class="card-body" method="POST" th:action="@{/medical-records/{id}/edit(id=${medicalRecord.id})}"
                  th:object="${medicalRecord}">
                <input th:field="*{id}" type="hidden"/>
                <div class="mb-4">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Datos Básicos</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mascota:</label>
                            <input th:field="*{pet.id}" type="hidden"/>
                            <div class="form-control bg-light">
                                <span th:text="${medicalRecord.pet.name + ' (' + medicalRecord.pet.owner.firstName + ' ' + medicalRecord.pet.owner.lastName + ')'}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Motivo de Consulta</label>
                            <textarea class="form-control" placeholder="Ingrese el motivo de la consulta..." required
                                      rows="3" th:field="*{visits[0].reasonForVisit}"></textarea>
                        </div>
                    </div>
                </div>

                <div class="mb-4 border p-3 rounded bg-light">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Examen Clínico (Visita Inicial)</h4>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Temperatura (°C)</label>
                            <input class="form-control" placeholder="Ej: 38.5" required
                                   step="0.1" th:field="*{visits[0].clinicalExam.temperature}" type="number">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Frec. Cardíaca (lpm)</label>
                            <input class="form-control" placeholder="Ej: 90"
                                   required
                                   th:field="*{visits[0].clinicalExam.heartRate}" type="number">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Frec. Respiratoria (rpm)</label>
                            <input class="form-control" placeholder="Ej: 25"
                                   required
                                   th:field="*{visits[0].clinicalExam.respiratoryRate}" type="number">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Pulso (lpm)</label>
                            <input class="form-control" placeholder="Ej: 100" required
                                   th:field="*{visits[0].clinicalExam.pulse}" type="number">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mucosas</label>
                            <input class="form-control" placeholder="Ej: Irritadas, húmedas"
                                   required th:field="*{visits[0].clinicalExam.mucosalMembranes}" type="text">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Temperamento</label>
                            <select class="form-select" required th:field="*{visits[0].clinicalExam.temperament}">
                                <option th:each="temp : ${T(tfg.psygcv.model.pet.Temperament).values()}"
                                        th:text="${temp.description}" th:value="${temp}"></option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Descripción del Examen</label>
                            <textarea class="form-control" placeholder="Detalles del examen realizado" rows="2"
                                      th:field="*{visits[0].clinicalExam.description}"></textarea>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Anamnesis</h4>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Alimentación</label>
                            <input class="form-control" placeholder="Ej: Alimento balanceado X, 2 veces al día"
                                   th:field="*{visits[0].anamnesis.diet}" type="text">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Estado Reproductivo</label>
                            <select class="form-select" th:field="*{visits[0].anamnesis.reproductiveStatus}">
                                <option th:each="status : ${T(tfg.psygcv.model.pet.ReproductiveStatus).values()}"
                                        th:text="${status.description}" th:value="${status}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Última Desparasitación</label>
                            <input class="form-control" th:field="*{visits[0].anamnesis.lastDewormingDate}" type="date">
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-6 mb-2 mb-md-0">
                            <button class="btn btn-primary w-100" type="submit">
                                <i class="bi bi-save me-2"></i>Actualizar Historia Clínica
                            </button>
                        </div>
                        <div class="col-md-6">
                            <a class="btn btn-secondary w-100"
                               th:href="@{/medical-records/{id}(id=${medicalRecord.id})}">
                                <i class="bi bi-x-circle me-2"></i> Cancelar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    function addVaccine() {
        const container = document.getElementById("vaccines-container");
        const index = container.children.length;
        const template = `
                <div class="vaccine-template row g-3 mb-3">
                    <div class="col-md-3"><input type="date" class="form-control" name="anamnesis.vaccines[${index}].applicationDate" required></div>
                    <div class="col-md-3"><input type="text" class="form-control" name="anamnesis.vaccines[${index}].brand" placeholder="Marca" required></div>
                    <div class="col-md-3"><input type="text" class="form-control" name="anamnesis.vaccines[${index}].batch" placeholder="Número de lote" required></div>
                    <div class="col-md-2"><input type="text" class="form-control" name="anamnesis.vaccines[${index}].dose" placeholder="Dosis" required></div>
                    <div class="col-md-1"><button type="button" class="btn btn-danger w-100" onclick="removeVaccine(this)"><i class="bi bi-trash"></i></button></div>
                </div>`;
        container.insertAdjacentHTML("beforeend", template);
    }

    function removeVaccine(button) {
        button.closest('.vaccine-template').remove();
    }

    function addDiagnostic() {
        const container = document.getElementById('diagnostics-container');
        const index = container.children.length;
        const template = `
                <div class="diagnostic-template card mb-3 shadow-sm">
                    <div class="card-body">
                        <div class="row g-3 align-items-center">
                            <div class="col-md-11"><input type="text" class="form-control" name="diagnostics[${index}].problems" placeholder="Descripción del problema" required></div>
                            <div class="col-md-1"><button type="button" class="btn btn-danger w-100" onclick="removeDiagnostic(this)"><i class="bi bi-trash"></i></button></div>
                        </div>
                    </div>
                </div>`;
        container.insertAdjacentHTML("beforeend", template);
    }

    function removeDiagnostic(button) {
        button.closest('.diagnostic-template').remove();
    }

    function addTreatment() {
        const container = document.getElementById('treatments-container');
        const index = container.children.length;
        const template = `
                <div class="treatment-template card mb-3 shadow-sm">
                    <div class="card-body">
                        <div class="row g-3 align-items-center">
                            <div class="col-md-3"><input type="text" class="form-control" name="treatments[${index}].product" placeholder="Producto" required></div>
                            <div class="col-md-2"><input type="text" class="form-control" name="treatments[${index}].route" placeholder="Vía" required></div>
                            <div class="col-md-2"><input type="text" class="form-control" name="treatments[${index}].frequency" placeholder="Frecuencia" required></div>
                            <div class="col-md-2"><input type="date" class="form-control" name="treatments[${index}].startDate" required></div>
                            <div class="col-md-2"><input type="date" class="form-control" name="treatments[${index}].endDate"></div>
                            <div class="col-md-1"><button type="button" class="btn btn-danger w-100" onclick="removeTreatment(this)"><i class="bi bi-trash"></i></button></div>
                        </div>
                    </div>
                </div>`;
        container.insertAdjacentHTML('beforeend', template);
    }

    function removeTreatment(button) {
        button.closest('.treatment-template').remove();
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
