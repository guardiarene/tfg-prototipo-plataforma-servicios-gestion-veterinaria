<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Historia Clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Editar Historia Clínica', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="card shadow">
            <div th:replace="~{fragments/card-header :: cardHeader('bi-pencil-square', 'Editar Historia Clínica', null)}"></div>
            <form class="card-body" method="POST"
                  th:action="@{/medical-records/{id}/edit(id=${medicalRecordId})}"
                  th:object="${medicalRecord}">
                <div th:if="${error}"
                     th:insert="~{fragments/alert :: errorAlert(${error})}"></div>
                <div class="mb-4">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Actualización de Historia Clínica</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mascota:</label>
                            <div class="form-control bg-light">
                                <span th:text="${petName}"></span>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold" for="generalObservations">Observaciones Generales de la
                                Historia</label>
                            <textarea class="form-control" id="generalObservations"
                                      placeholder="Observaciones permanentes o importantes de la historia clínica..."
                                      rows="4" th:field="*{generalObservations}"></textarea>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-6 mb-2 mb-md-0">
                            <button class="btn btn-primary w-100" type="submit">
                                <i aria-hidden="true" class="bi bi-save me-2"></i>Actualizar Historia Clínica
                            </button>
                        </div>
                        <div class="col-md-6">
                            <a class="btn btn-secondary w-100"
                               th:href="@{/medical-records/{id}(id=${medicalRecordId})}">
                                <i aria-hidden="true" class="bi bi-x-circle me-2"></i> Cancelar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
