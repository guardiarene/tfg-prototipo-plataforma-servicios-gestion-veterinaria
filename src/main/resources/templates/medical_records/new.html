<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Historia Clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Nueva Historia Clínica', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content}, ~{})}">
    <div class="container mt-4" th:fragment="content">
        <div class="card shadow">
            <div th:replace="~{fragments/card-header :: cardHeader('bi-file-medical-fill', 'Nueva Historia Clínica', null)}"></div>
            <form class="card-body" method="POST" th:action="@{/medical-records/new}" th:object="${medicalRecord}">
                <div th:if="${error}"
                     th:insert="~{fragments/alert :: errorAlert(${error})}"></div>
                <div class="mb-4">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Datos Básicos</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold" for="petId">Mascota:</label>
                            <select class="form-select" id="petId" required th:field="*{petId}">
                                <option value="">Seleccionar mascota...</option>
                                <option th:each="pet : ${pets}"
                                        th:text="${pet.name + ' (' + pet.ownerFullName + ')'}"
                                        th:value="${pet.id}"></option>
                            </select>
                            <div class="text-danger small" th:errors="*{petId}"></div>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-bold" for="generalObservations">Observaciones Generales
                                (opcional)</label>
                            <textarea class="form-control" id="generalObservations"
                                      placeholder="Observaciones permanentes o importantes de la historia clínica..."
                                      rows="3" th:field="*{generalObservations}"></textarea>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-6 mb-2 mb-md-0">
                            <button class="btn btn-primary w-100" type="submit">
                                <i aria-hidden="true" class="bi bi-save me-2"></i>Guardar Historia Clínica
                            </button>
                        </div>
                        <div class="col-md-6">
                            <a class="btn btn-secondary w-100" th:href="@{/veterinarian/dashboard}">
                                <i aria-hidden="true" class="bi bi-x-circle me-2"></i> Cancelar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
