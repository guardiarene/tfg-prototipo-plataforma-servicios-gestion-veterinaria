<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Historia Clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: layout('Nueva Historia Clínica', ~{layouts/navbar :: navbar('VETERINARIAN')}, ~{::content})}">
    <div class="container mt-4" th:fragment="content">
        <div class="card shadow">
            <div th:replace="~{fragments/card-header :: cardHeader('bi-file-medical-fill', 'Nueva Historia Clínica', null)}"></div>
            <form class="card-body" method="POST" th:action="@{/medical-records/new}" th:object="${medicalRecord}">
                <div class="mb-4">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Datos Básicos</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mascota:</label>
                            <label>
                                <select class="form-select" required th:field="*{pet}">
                                    <option value="">Seleccionar mascota...</option>
                                    <option th:each="pet : ${pets}"
                                            th:text="${pet.name + ' (' + pet.owner.firstName + ' ' + pet.owner.lastName + ')'}"
                                            th:value="${pet.id}"></option>
                                </select>
                            </label>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Motivo de Consulta</label>
                            <label>
<textarea class="form-control" placeholder="Ingrese el motivo de la consulta..." required
          rows="3" th:field="*{visits[0].reasonForVisit}"></textarea>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mb-4 border p-3 rounded bg-light">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Examen Clínico (Visita Inicial)</h4>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Temperatura (°C)</label>
                            <label>
                                <input class="form-control" placeholder="Ej: 38.5" required
                                       step="0.1" th:field="*{visits[0].clinicalExam.temperature}" type="number">
                            </label>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Frec. Cardíaca (lpm)</label>
                            <label>
                                <input class="form-control" placeholder="Ej: 90"
                                       required
                                       th:field="*{visits[0].clinicalExam.heartRate}" type="number">
                            </label>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Frec. Respiratoria (rpm)</label>
                            <label>
                                <input class="form-control" placeholder="Ej: 25"
                                       required
                                       th:field="*{visits[0].clinicalExam.respiratoryRate}" type="number">
                            </label>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Pulso (lpm)</label>
                            <label>
                                <input class="form-control" placeholder="Ej: 100" required
                                       th:field="*{visits[0].clinicalExam.pulse}" type="number">
                            </label>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mucosas</label>
                            <label>
                                <input class="form-control" placeholder="Ej: Rosadas, húmedas"
                                       required th:field="*{visits[0].clinicalExam.mucosalMembranes}" type="text">
                            </label>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Temperamento</label>
                            <label>
                                <select class="form-select" required th:field="*{visits[0].clinicalExam.temperament}">
                                    <option disabled selected value="">Seleccionar temperamento...</option>
                                    <option th:each="temp : ${T(tfg.psygcv.model.pet.Temperament).values()}"
                                            th:text="${temp.description}" th:value="${temp}"></option>
                                </select>
                            </label>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Descripción del Examen</label>
                            <label>
<textarea class="form-control" placeholder="Detalles del examen realizado" rows="2"
          th:field="*{visits[0].clinicalExam.description}"></textarea>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <h4 class="mb-3 border-bottom pb-2 text-primary">Anamnesis</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Alergias</label>
                            <label>
                                <input class="form-control" placeholder="Ej: Penicilina, polen"
                                       th:field="*{visits[0].anamnesis.allergies}" type="text">
                            </label>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Enfermedades Previas</label>
                            <label>
                                <input class="form-control" placeholder="Ej: Parvovirus a los 6 meses"
                                       th:field="*{visits[0].anamnesis.previousDiseases}" type="text">
                            </label>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Cirugías</label>
                            <label>
                                <input class="form-control" placeholder="Ej: Ortopédica de cadera"
                                       th:field="*{visits[0].anamnesis.surgeries}" type="text">
                            </label>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Medicación Actual</label>
                            <label>
                                <input class="form-control" placeholder="Ej: Vitaminas, antibióticos"
                                       th:field="*{visits[0].anamnesis.currentMedications}" type="text">
                            </label>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Alimentación</label>
                            <label>
                                <input class="form-control" placeholder="Ej: Alimento Balanceado X, 2 veces al día"
                                       th:field="*{visits[0].anamnesis.diet}" type="text">
                            </label>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Estado Reproductivo</label>
                            <label>
                                <select class="form-select" th:field="*{visits[0].anamnesis.reproductiveStatus}">
                                    <option disabled selected value="">Seleccionar estado...</option>
                                    <option th:each="status : ${T(tfg.psygcv.model.pet.ReproductiveStatus).values()}"
                                            th:text="${status.description}" th:value="${status}"></option>
                                </select>
                            </label>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Última Desparasitación</label>
                            <label>
                                <input class="form-control" th:field="*{visits[0].anamnesis.lastDewormingDate}" type="date">
                            </label>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Último Celo (si aplica)</label>
                            <label>
                                <input class="form-control" th:field="*{visits[0].anamnesis.lastHeatDate}" type="date">
                            </label>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Último Parto (si aplica)</label>
                            <label>
                                <input class="form-control" th:field="*{visits[0].anamnesis.lastBirthDate}" type="date">
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                        <h4 class="mb-0 text-primary">Vacunas Aplicadas</h4>
                        <button type="button" class="btn btn-outline-success btn-sm" onclick="addVaccine()">
                            <i class="bi bi-plus-circle me-1"></i>Añadir Vacuna
                        </button>
                    </div>
                    <div id="vaccines-container">
                        <!-- Aquí se añadirán las vacunas dinámicamente -->
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                        <h4 class="mb-0 text-primary">Diagnóstico</h4>
                        <button type="button" class="btn btn-outline-success btn-sm" onclick="addDiagnostic()">
                            <i class="bi bi-plus-circle me-1"></i>Añadir Diagnóstico
                        </button>
                    </div>
                    <div id="diagnostics-container">
                        <!-- Aquí se añadirán los diagnósticos dinámicamente -->
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                        <h4 class="mb-0 text-primary">Tratamiento</h4>
                        <button type="button" class="btn btn-outline-success btn-sm" onclick="addTreatment()">
                            <i class="bi bi-plus-circle me-1"></i>Añadir Tratamiento
                        </button>
                    </div>
                    <div id="treatments-container">
                        <!-- Aquí se añadirán los tratamientos dinámicamente -->
                    </div>
                </div>

                <div class="mt-4">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-6 mb-2 mb-md-0">
                            <button class="btn btn-primary w-100" type="submit">
                                <i class="bi bi-save me-2"></i>Guardar Historia Clínica
                            </button>
                        </div>
                        <div class="col-md-6">
                            <a class="btn btn-secondary w-100" th:href="@{/veterinarian/dashboard}">
                                <i class="bi bi-x-circle me-2"></i> Cancelar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    function addVaccine() {
        const container = document.getElementById("vaccines-container");
        const index = container.children.length;
        const template = `
                <div class="vaccine-template row g-3 mb-3">
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Fecha Aplicación</label>
                        <input type="date" class="form-control" name="visits[0].vaccines[${index}].applicationDate" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Marca</label>
                        <input type="text" class="form-control" name="visits[0].vaccines[${index}].brand" placeholder="Marca" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Lote</label>
                        <input type="text" class="form-control" name="visits[0].vaccines[${index}].batch" placeholder="Lote" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">Dosis</label>
                        <input type="text" class="form-control" name="visits[0].vaccines[${index}].dose" placeholder="Dosis" required>
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="button" class="btn btn-danger w-100" onclick="removeVaccine(this)"><i class="bi bi-trash"></i></button>
                    </div>
                </div>`;
        container.insertAdjacentHTML("beforeend", template);
    }

    function removeVaccine(button) {
        button.closest('.vaccine-template').remove();
    }

    function addDiagnostic() {
        const container = document.getElementById('diagnostics-container');
        const index = container.children.length;
        const template = `
                <div class="diagnostic-template card mb-3 shadow-sm">
                    <div class="card-body">
                        <div class="row g-3 align-items-center">
                            <div class="col-md-11">
                                <label class="form-label small fw-bold">Problemas / Hallazgos</label>
                                <input type="text" class="form-control" name="visits[0].diagnostics[${index}].problems[0]" placeholder="Descripción detallada del problema" required>
                            </div>
                            <div class="col-md-1 d-flex align-items-end">
                                <button type="button" class="btn btn-danger w-100" onclick="removeDiagnostic(this)"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
        container.insertAdjacentHTML("beforeend", template);
    }

    function removeDiagnostic(button) {
        button.closest('.diagnostic-template').remove();
    }

    function addTreatment() {
        const container = document.getElementById('treatments-container');
        const index = container.children.length;
        const template = `
                <div class="treatment-template card mb-3 shadow-sm">
                    <div class="card-body">
                        <div class="row g-3 align-items-center">
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">Producto</label>
                                <input type="text" class="form-control" name="visits[0].treatments[${index}].product" placeholder="Producto" required>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Vía</label>
                                <input type="text" class="form-control" name="visits[0].treatments[${index}].route" placeholder="Vía" required>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Frecuencia</label>
                                <input type="text" class="form-control" name="visits[0].treatments[${index}].frequency" placeholder="Frecuencia" required>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Inicio</label>
                                <input type="date" class="form-control" name="visits[0].treatments[${index}].startDate" required>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Fin</label>
                                <input type="date" class="form-control" name="visits[0].treatments[${index}].endDate">
                            </div>
                            <div class="col-md-1 d-flex align-items-end">
                                <button type="button" class="btn btn-danger w-100" onclick="removeTreatment(this)"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
        container.insertAdjacentHTML('beforeend', template);
    }

    function removeTreatment(button) {
        button.closest('.treatment-template').remove();
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
